name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  verificacao-qualidade:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Instalar dependências do sistema (Tkinter)
      run: sudo apt-get install python3-tk

    - name: Instalar dependências do Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8

    - name: Análise Estática com flake8 (Linting)
      run: |
        # Verifica se há erros de sintaxe ou variáveis não usadas
        flake8 app.py test_app.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # Verifica o estilo do código (limite de 120 caracteres por linha)
        flake8 app.py test_app.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Executar Testes Automatizados
      run: |
        pytest test_app.py